name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pefile yara-python python-tlsh oletools lief Pillow numpy

      - name: Compile
        run: python -m py_compile laelaps.py

      - name: Smoke test (one sample per detection domain)
        run: python tests/smoke_test.py

      - name: Attribution corpus test (family breadth + UI wiring)
        run: python tests/corpus_test.py

      - name: Bulk / large-target scanner test (repack + sampled scan)
        run: python tests/bulk_test.py
