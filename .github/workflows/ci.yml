name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pefile yara-python python-tlsh oletools lief Pillow numpy py7zr

      - name: Compile
        run: python -m py_compile laelaps.py

      - name: Smoke test (one sample per detection domain)
        run: python tests/smoke_test.py

      - name: Attribution corpus test (family breadth + UI wiring)
        run: python tests/corpus_test.py

      - name: Bulk / large-target scanner test (repack + sampled scan)
        run: python tests/bulk_test.py

      - name: LNK shortcut + ATT&CK Navigator test
        run: python tests/lnk_test.py

      - name: Archive-aware scanning test (zip + 7z expansion)
        run: python tests/archive_test.py

      - name: LOLBAS / GTFOBins living-off-the-land test
        run: python tests/lolbas_test.py

      - name: Icon perceptual-hash test (fake-installer / icon reuse)
        run: python tests/icon_test.py

      - name: Clustering-hash test (authentihash + elf_symhash)
        run: python tests/hashpivot_test.py
